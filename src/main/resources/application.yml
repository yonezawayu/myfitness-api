spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/myfitness
    username: myfitness_user
    password: myfitness_pass
    driver-class-name: org.postgresql.Driver
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS"
  expiration-minutes: 60
  issuer: "myfitness-api"
